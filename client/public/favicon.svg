<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- White Background with subtle border -->
  <rect width="64" height="64" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"></rect>

  <!-- Car Body -->
  <rect x="6" y="26" width="52" height="16" rx="7" fill="#1E88E5"></rect>

  <!-- Car Top -->
  <path d="M14 26 L24 14 H40 L50 26 Z" fill="#64B5F6"></path>

  <!-- Window -->
  <rect x="26" y="18" width="12" height="6" rx="2" fill="#BBDEFB"></rect>

  <!-- Headlights -->
  <rect x="8" y="32" width="3" height="4" rx="1" fill="#FFF59D"></rect>
  <rect x="53" y="32" width="3" height="4" rx="1" fill="#FFF59D"></rect>

  <!-- Wheels -->
  <circle cx="22" cy="44" r="5" fill="#212121"></circle>
  <circle cx="42" cy="44" r="5" fill="#212121"></circle>

  <!-- Wheel Inner -->
  <circle cx="22" cy="44" r="2" fill="#B0BEC5"></circle>
  <circle cx="42" cy="44" r="2" fill="#B0BEC5"></circle>
</svg>